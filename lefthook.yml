# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}'
      run: bunx oxlint --fix {staged_files} && bunx oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: check-types
      run: bun run check-types
